<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />

    <!-- PWA: 테마 색상 -->
    <meta name="theme-color" content="#2563eb" />

    <!-- PWA: Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA: iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Findy" />
    <!--
      iOS Safari는 PNG(권장: 180x180)를 apple-touch-icon으로 사용합니다.
      SVG를 지정하면 홈 화면 아이콘이 누락되거나 기본 아이콘으로 대체될 수 있습니다.
      icon-180x180.png 파일은 client/public/icons/ 에 추가되어야 합니다.
    -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/icon-180x180.png"
    />

    <!-- 파비콘 -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
