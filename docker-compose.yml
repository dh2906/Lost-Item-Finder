services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lost-found-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lost_found_finder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lost_found_finder"]
      interval: 5s
      timeout: 5s
      retries: 10
