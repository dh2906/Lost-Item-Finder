      <path d="M52 17 C70 30 74 45 62 67 C83 53 87 29 65 14 C61 27 56 34 48 39 C48 31 49 24 52 17 Z" fill="#f97316"/>
      <path d="M46 38 C31 47 31 65 52 72 C45 61 48 52 59 42 C56 57 61 63 69 69 C79 50 66 36 46 38 Z" fill="#f59e0b"/>
