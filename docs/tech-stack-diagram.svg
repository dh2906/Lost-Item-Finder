<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Lost Item Finder Technology Stack Diagram</title>
  <desc id="desc">White background architecture diagram showing frontend, backend, AI, database, and infrastructure technology stacks.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 800 42px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 19px Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: 0; }
      .section-title { font: 800 28px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .section-subtitle { font: 600 15px Arial, Helvetica, sans-serif; fill: #64748b; letter-spacing: 0; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .small { font: 700 12px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0; }
      .micro { font: 700 10px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 0; }
      .line { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrowGray); }
      .blue-line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke-dasharray: 9 9; }
      .card { fill: #ffffff; stroke-width: 2.5; filter: url(#softShadow); }
      .tile { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
